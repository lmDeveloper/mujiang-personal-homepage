name: Deploy personal homepage

on:
  workflow_dispatch:
  schedule:
    - cron: "12 0 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - run: pnpm install --frozen-lockfile
      - name: Refresh AI news
        run: pnpm update:news
      - name: Build
        run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Commit refreshed AI news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh ai news"
          file_pattern: public/data/ai-news.json
